name: Focused tests

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
  workflow_dispatch:

jobs:
  focused-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtualenv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install -e . pytest pytest-asyncio

      - name: Run focused regression tests
        run: |
          . .venv/bin/activate
          python -m pytest -q \
            tests/test_output_sanitizer.py \
            tests/test_project_workspace.py \
            tests/test_agent_project_mode.py \
            tests/test_cli_project_mode.py \
            tests/test_quick_search.py \
            tests/test_cli_flow.py \
            tests/test_workspace_flow.py \
            tests/test_capabilities.py
